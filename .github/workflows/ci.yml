name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile source
        run: python -m compileall app

      - name: Import app smoke check
        run: |
          python - <<'PY'
          from app.main import app
          assert app.title == "Unified Storage Management System"
          print("App import smoke check passed")
          PY
